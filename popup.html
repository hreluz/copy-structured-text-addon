<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Copy Rules</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <h1>Copy Rules</h1>

    <form id="rule-form">
      <input id="editIndex" type="hidden" value="" />

      <label>
        Name
        <input id="name" type="text" placeholder="Custom card title" required />
      </label>

      <label>
        Container Selector
        <input id="containerSelector" type="text" placeholder=".card" required />
      </label>

      <label>
        Text Selector
        <input id="textSelector" type="text" placeholder=".card-title" />
      </label>

      <button id="submitButton" type="submit">Add Rule</button>
      <button id="cancelEditButton" type="button" class="secondary hidden">Cancel Edit</button>
    </form>

    <hr />

    <h2>Custom Rules</h2>
    <ul id="rules-list"></ul>

    <hr />

    <h2>Last Match</h2>
    <div id="last-match">No copied rule yet.</div>

    <hr />

    <h2>Final Rule Order</h2>
    <ul id="merged-rules-list"></ul>

    <script src="defaultRules.js"></script>
    <script src="ruleStorage.js"></script>
    <script src="ruleMerger.js"></script>
    <script src="selectorValidation.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
